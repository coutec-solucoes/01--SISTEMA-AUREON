<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aureon Retaguarda — Painel Administrativo de Gestão Inteligente" />
    <title>Aureon Retaguarda</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Google Fonts: Outfit & Inter para design premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Splash screen premium de carregamento -->
        <div id="splash-screen">
            <div class="splash-logo">
                <div class="splash-icon">⚡</div>
                <div class="splash-titulo">AUREON RETAGUARDA</div>
                <div class="splash-subtitulo">Inicializando painel administrativo...</div>
                <div class="splash-barra">
                    <div class="splash-progresso"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        <span>Ocorreu um erro crítico na retaguarda.</span>
        <a href="" class="reload">Recarregar</a>
        <a class="dismiss">✕</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
